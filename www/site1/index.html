<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sloth Upload - Site 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <div class="emoji">🦥☁️</div>
    <h1>Site 1</h1>
    <p>Upload & delete files — simple and sleepy 💗</p>

    <!-- Upload form (inchangé) -->
    <h3 class="section-title">Upload</h3>
    <form action="/upload" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button type="submit">Upload 🦥</button>
    </form>

    <hr>

    <!-- Delete section -->
    <h3 class="section-title">Delete</h3>
    <input type="text" id="filename" placeholder="Filename to delete (example.txt)" required>
    <button class="danger" type="button" onclick="deleteFromInput()">Delete 🗑</button>

    <div id="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>
